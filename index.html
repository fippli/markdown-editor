<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Markdown</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body data-mode="edit">
    <main id="app">
      <section id="editor-root"></section>
      <section id="preview-root" aria-hidden="true"></section>
    </main>
    <footer id="status-line" aria-live="polite">
      <span id="status-name"></span>
      <span id="status-dirty" aria-hidden="true"></span>
      <span id="status-mode"></span>
      <span id="status-words"></span>
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
